<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JJ Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            color: white;
            min-height: screen;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-gradient {
            background: linear-gradient(to right, #00f2fe, #a18cd1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="fixed top-0 right-0 w-96 h-96 bg-purple-600/20 rounded-full blur-[120px] -z-10"></div>
    <div class="fixed bottom-0 left-0 w-96 h-96 bg-cyan-600/10 rounded-full blur-[120px] -z-10"></div>

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-display font-extrabold tracking-tight">
                    Patient <span class="text-gradient">Inquiries.</span>
                </h1>
                <p class="text-slate-400 font-semibold mt-2">Local Storage Database (Prototype)</p>
            </div>
            <div class="flex gap-4">
                <button onclick="exportToCSV()" class="glass-card px-6 py-3 rounded-2xl font-bold text-sm hover:bg-white/10 transition-all">
                    <i class="fa-solid fa-file-export mr-2"></i> Export CSV
                </button>
                <button onclick="clearData()" class="bg-red-500/10 text-red-400 border border-red-500/20 px-6 py-3 rounded-2xl font-bold text-sm hover:bg-red-500/20 transition-all">
                    Clear All
                </button>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5">
                            <th class="p-6 text-xs uppercase tracking-widest font-bold text-slate-400">Date Logged</th>
                            <th class="p-6 text-xs uppercase tracking-widest font-bold text-slate-400">Patient</th>
                            <th class="p-6 text-xs uppercase tracking-widest font-bold text-slate-400">Service</th>
                            <th class="p-6 text-xs uppercase tracking-widest font-bold text-slate-400">Preferred Appointment</th>
                            <th class="p-6 text-xs uppercase tracking-widest font-bold text-slate-400">Notes</th>
                            <th class="p-6 text-xs uppercase tracking-widest font-bold text-slate-400">Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTableBody">
                        </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden p-20 text-center">
                <i class="fa-solid fa-folder-open text-5xl text-slate-700 mb-4"></i>
                <p class="text-slate-500 font-bold">No leads found in local storage.</p>
            </div>
        </div>
    </div>

    <script>
        function loadData() {
            const bookings = JSON.parse(localStorage.getItem('jj_clinic_bookings')) || [];
            const tableBody = document.getElementById('bookingTableBody');
            const emptyState = document.getElementById('emptyState');

            if (bookings.length === 0) {
                emptyState.classList.remove('hidden');
                tableBody.innerHTML = '';
                return;
            }

            emptyState.classList.add('hidden');
            tableBody.innerHTML = bookings.map(b => `
                <tr>
                    <td class="p-6 text-sm font-semibold text-slate-400">${b.submittedAt}</td>
                    <td class="p-6">
                        <div class="font-bold text-white">${b.name}</div>
                        <div class="text-xs text-cyan-400 font-bold mt-1">${b.phone}</div>
                    </td>
                    <td class="p-6">
                        <span class="px-3 py-1 bg-purple-500/20 text-purple-300 rounded-full text-[10px] font-bold uppercase tracking-wider">
                            ${b.service}
                        </span>
                    </td>
                    <td class="p-6 text-sm font-bold text-slate-300">${b.preferredDate}</td>
                    <td class="p-6 text-sm text-slate-400 italic max-w-xs truncate">${b.message || 'No notes'}</td>
                    <td class="p-6">
                        <a href="https://wa.me/${b.phone.replace(/\s+/g, '')}" target="_blank" class="text-green-400 hover:text-green-300 transition-colors">
                            <i class="fa-brands fa-whatsapp text-xl"></i>
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        function clearData() {
            if(confirm('Are you sure you want to clear all leads? This cannot be undone.')) {
                localStorage.removeItem('jj_clinic_bookings');
                loadData();
            }
        }

        function exportToCSV() {
            const bookings = JSON.parse(localStorage.getItem('jj_clinic_bookings')) || [];
            if(bookings.length === 0) return alert('No data to export');

            const headers = ['Date Logged', 'Name', 'Phone', 'Service', 'Appt Date', 'Message'];
            const rows = bookings.map(b => [
                b.submittedAt, b.name, b.phone, b.service, b.preferredDate, b.message
            ]);

            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "jj_clinic_leads.csv");
            document.body.appendChild(link);
            link.click();
        }

        // Initial Load
        loadData();
    </script>
</body>
</html>
